<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>formulario</title>
</head>
<body>
	 <h1> <marquee direction="right" behavior="alternate" scrollamount="8"><mark>cadastro de professores</mark></marquee></h1>
	 <hr>

	 <form>
<!--fildset cria uma "caixa" em volta do formulario,o legend coloca um pequeno titulo na linha da caixa-->
		<fieldset>
			<legend><b><i><small>dados pessoais</small></i></b></legend> 	
	 	<!-- o input significa que é um comando de entrada de dados-->
	 	<!--size aumenta o campo de digitaçao do usuario-->
	 	<!-- maxlength limita o numero de caracteres do campo de digitaçao sendo o contrario do minlength-->
	 	<!-- faz com que a caixinha se torne um campo obrigatório-->
	 	<!-- placeholder  deixa um aviso no campo de escrita-->
	 	<label>nome:</label><br>
	 	<input type="text" name="nome" size="40" maxlength="20" required placeholder="digite o nome completo sem abreviaçoes" id="nome">

	 	<br><br>
	 	<label>idade:</label><br>
	 	<input type="number" name="idade" min="18" max="9999999999999999" step="1" placeholder="min 18 betinha" id="idade">
	 	<!-- step fala de quanto em quantos a idade vai avançar-->


	 	<br><br>
	 	<!--radio cria uma bolinha de escolha,todos os campos devem ter o mesmo nome no caso abaixo "sexo"-->
	 	<labeL>sexo:</labeL><br>
	 	F <input type="radio" name="sexo" value="f">
	 	M <input type="radio" name="sexo" value="m" checked>
	 	outro <input type="radio" name="sexo" value="outro">

	 	<br><br>

	 	<label>data nascimento:</label><br>
	 	<input type="date" name="dataNasc" id="dataNasc" required >

	 	<br><br>
<!--accept seleciona oque vocÊ pode colocar no campo, obs:"/*" significa todas as imagens no exemplo abaixo-->
	 	<label>foto:</label><br>
	 	<input type="file" name="foto" id="foto" accept="image/png">

	 	<br><br>

	 	<label>login:</label><br>
	 	<input type="text" name="login" size="15" minlength="8" maxlength="10" required id="login"> 

	 	<br><br>

	 	<label>senha:</label><br>
	 	<input type="password" name="senha" id="senha" size="10" required minlength="8"  maxlength="10" >

	 	<br><br>
	 	<!-- submit é "submeta este formulario a isto" e  faz uma verificaçao das regras colocadas. ja value é o nome do botão-->
	 	<input type="submit" value="cadastrar" id="cadastrar" style="color: green;">

	 </fieldset>

	 <fieldset>
	 	<legend><i><b><small>dados profissionais</small></i></b></legend>

	 	<label for="cargo">cargo</label><br>
	 	<!--o readonly deixa algo escrito que nao pode ser modificado no campo de digitaçao-->
	 	<input type="text" name="cargo" size="25" value="professor (a)"readonly id="cargo">

	 	<br><br>
	 	<label for="trabalho">periodo de trabalho</label><br>
	 	<input type="checkbox" name="manha" checked>manha<br>
	 	<input type="checkbox" name="tarde">tarde<br>
	 	<input type="checkbox" name="noite">noite

	 	<br><br>

	 	<label for="trabalho">cor do uniforme</label><br>
	 	<input type="color" name="corUniforme" value="purple">

	 	<br><br>
	 	<label>Quanto você se sente preparado para a função:</label>
	 	<br>
	 	0<input type="range" name="capct" id="capct" min="0" max="10" value="3">10


	 	<br><br>
	 	<label for="curso">curso:</label><br>
	 	<select name="curso" id="curso">
	 		<option value=""></option>
	 		<option selected value="Desenvolvimento de Sistemas">Desenvolvimento de Sistemas</option>
	 		<option value="Enfermagem">Enfermagem</option>
	 		<option value="Mecânica">Mecânica</option>
	 		<option value="Agrimensura">Agrimensura</option>
	 		<option value="Edificações">Edificações</option>
	 		<option value="Qualidade">Qualidade</option>
	 	</select>
	 	<!--value serve para indicar o nome que vai aparecer no banco de dados, quando se falar daquele tópico-->

	 	<br><br>
	 	<label>Disciplinas Preferidas:</label><br>
	 	<select name="DisciplinasPref" id="DisciplinasPref" size="6" multiple>
	 		<option>BD</option>
	 		<option>DAW</option>
	 		<option>Log_Prog</option>
	 		<option>RSSI</option>
	 		<option>FI</option>
	 		<option>Inova</option>
	 	</select>
	 	<!--se usa multiple quando vc dx escolher mais doq um-->
	 	<br>
	 	<small>Ctrl + Click para selecionar mais que um</small>

	 	<br><br>
	 	<label>Formação:</label><br>
	 	<select id="formacao">
	 		<option></option>
	 		<optgroup label="Graduação">
	 			<option value="Biológicas">Biológicas</option>
	 			<option value="Exatas">Exatas</option>
	 			<option value="Engenharia">Engenharia</option>
	 			<option value="Humanas">Humanas</option>
	 			<option value="Tecnologia">Tecnologia</option>
	 		</optgroup>
	 		<optgroup label="Pós-Graduação">
	 			<option value="Latu-Sensu">Latu-Sensu</option>
	 			<option value="Mestrado">Mestrado</option>
	 			<option value="Doutorado">Doutorado</option>
	 			<option value="Pós-doc">Pós-doc</option>
	 		</optgroup>
	 	</select>
	 	<br><br>

	 	<label>Conhecimento:</label><br>
	 	<input type="text" name="conhecimento" id="conhecimento" list="lista">
	 	<!--o list é usado para relacionar o input a uma lista sendo preciso colocar o id da lista que deseja relacionar-->
	 	<br>
	 	<datalist id="lista">
	 		<option value="Bootstrap">Bootstrap</option>
	 		<option value="CSS3">CSS3</option>
	 		<option value="C#">C#</option>
	 		<option value="C++">C++</option>
	 		<option value="HTML5">HTML5</option>
	 		<option value="JavaScript">JavaScript</option>
	 		<option value="Node.js">Node.js</option>
	 		<option value="PHP">PHP</option>
	 		<option value="Python">Python</option>
	 		<option value="React">React</option>
	 	</datalist>
	 	<br>
	 	<input type="submit"  value="Cadastrar" style="color: green;" name="cadastrar2" id="cadastrar2">
	 </fieldset>

	 <fieldset>
	 	<legend><i><b>Data</b></i></legend>
	 	<label for="datatempo">Data e Hora do Cadastro</label><br>
	 	<input type="datetime-local" name="datatempo" id="datatempo">
	 	
	 	 <br><br>

	 <input type="submit" name="cadastrar3" value="Cadastrar" id="cadastrar3" style="color: green;">



	 </fieldset>

	 </form>

</body>
</html>
