<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Fã - Dragon Ball</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>Cadastro de Fã</h1>

    <p>
        Junte-se aos Guerreiros Z e registre suas informações.
    </p>

</header>

<nav>
    <a href="index.html">Página Inicial</a>
    <a href="#formulario">Formulário</a>
    <a href="#Mapa">Mapa</a>
</nav>

<section id="formulario">

    <div class="card">

        <div class="info">

            <h2>Formulário de Cadastro</h2>

            <form>

                <label>Nome Completo</label>
                <br>
                <input type="text" required>

                <br><br>

                <label>E-mail</label>
                <br>
                <input type="email" required>

                <br><br>

                <label>Idade</label>
                <br>
                <input type="number" min="1">

                <br><br>

                <label>Data de Nascimento</label>
                <br>
                <input type="date">

                <br><br>

                <label>Personagem Favorito</label>
                <br>

                <select>

                    <option>Goku</option>
                    <option>Vegeta</option>
                    <option>Gohan</option>
                    <option>Piccolo</option>
                    <option>Trunks</option>

                </select>

                <br><br>

                <label>Transformação Favorita</label>
                <br>

                <select>

                    <option>Super Saiyajin</option>
                    <option>Super Saiyajin 2</option>
                    <option>Super Saiyajin 3</option>
                    <option>Super Saiyajin God</option>
                    <option>Super Saiyajin Blue</option>
                    <option>Ultra Instinto</option>

                </select>

                <br><br>

                <label>Índole Favorita</label>
                <br>

                <input type="radio" name="classe"> Herói
                <input type="radio" name="classe"> Anti-Herói
                <input type="radio" name="classe"> Vilão

                <br><br>

                <label>Comentários</label>
                <br>

                <textarea rows="5"></textarea>

                <br><br>

                <input type="submit" value="Enviar Cadastro">

            </form>

        </div>

    </div>

</section>

<section id="Mapa">

    <div class="card">

        <div class="info">

            <h2>Mapa sobre o criador de Dragon Ball</h2>

            <p>
                Confira a cidade onde Akira Toriyama nasceu.
            </p>

            <iframe
                width="560"
                height="315"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d104305.17151535087!2d136.8926982452881!3d35.218009777040514!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600375b8e19aa469%3A0x950d44f9be3be48c!2zS2l5b3N1LCBBaWNoaSwgSmFww6Nv!5e0!3m2!1spt-BR!2sbr!4v1781047725332!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="Cidade onde Akira Toriyama nasceu"
                allowfullscreen>
            </iframe>

        </div>

    </div>

</section>



    </div>

</section>

<footer>

    <a href="index.html">
        ⬅ Voltar para a Página Inicial
    </a>

</footer>

</body>

</html>
